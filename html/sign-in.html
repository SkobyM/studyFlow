<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

    <main class="page-container">
        <img src="../img/appLogoBlack.png" alt="StudyFlow app logo" width="32" height="32" class="auth-logo">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-text">Sign in to your StudyFlow account</p>

        <div class="auth-card">
            <form action="../php/signIn.php" method="POST">

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" placeholder="Email" autocomplete="email" required class="auth-input">
                </div>


                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="Password" autocomplete="current-password" required class="auth-input">
                </div>

                <button type="submit" class="auth-button">Sign In</button>

            </form>
            <p class="auth-text">Don't have an account? <a href="sign-up.html" class="auth-link">Sign
                    Up</a></p>
        </div>

        <p><a href="../index.html" class="back-home-link">&#8592; Back to Home</a></p>

    </main>

</body>

</html>
