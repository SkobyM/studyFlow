<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../css/navBar.css">
    <link rel="stylesheet" href="../css/contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo"><img src="../img/appLogoBlack.png" alt="StudyFlow app logo" class="appLogo">StudyFlow
            </div>
            <div class="nav-links">
                <ul>
                    <li><a href="../index.html" class="nav">Home</a></li>
                    <li><a href="dashboard.html" class="nav">Dashboard</a></li>
                    <li><a href="about.html" class="nav">About</a></li>
                    <li><a href="contact.html" class="active nav">Contact</a></li>
                    <li class="sign-in-mobile">
                        <a href="signIn.html" class="signIn_btn">Sign In</a>
                    </li>
                </ul>
                <a href="signIn.html" class="btn_signin desktop-only">Sign In</a>
                <div class="menu-toggle">☰</div>
            </div>
        </nav>

        <script>
            const menu = document.querySelector(".menu-toggle");
            const navLinks = document.querySelector(".nav-links");

            menu.addEventListener("click", () => {
                navLinks.classList.toggle("active");

                if (navLinks.classList.contains("active")) {
                    menu.textContent = "✕";
                } else {
                    menu.textContent = "☰";
                }
            });
        </script>
    </header>

    <div class="main_texts_contact">
        <h2>Get in Touch</h2>
        <p>Have questions or feedback? We'd love to hear from you!</p>
    </div>

    <div class="container">
        <form action="mailto:m7mdbox1@gmail.com" method="post">
            <div class="form_container">
                <div class="first_last_name">
                    <div class="name">
                        <label for="first_name">First Name *</label>
                        <input type="text" id="first_name" name="first_name" placeholder="Your first name" required>
                    </div>
                    <div class="name">
                        <label for="last_name">Last Name *</label>
                        <input type="text" id="last_name" name="last_name" placeholder="Your last name" required>
                    </div>
                </div>

                <div class="gender_and_number">
                    <div class="row2">
                        <label for="gender">Gender *</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="row2">
                        <label for="mobile_number">Mobile Number *</label>
                        <input type="tel" id="mobile_number" name="mobile_number" placeholder="Your mobile number"
                            required>
                    </div>
                </div>

                <div class="date_email">
                    <div class="row3">
                        <label for="date_of_birth">Date of Birth *</label>
                        <input type="date" id="date_of_birth" name="date_of_birth" required>
                    </div>

                    <div class="row3">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" placeholder="Your email address" required>
                    </div>
                </div>
                <div class="row4">
                    <label for="message"> Message *</label>
                    <textarea name="message" id="message" required rows="10"></textarea>
                </div>

                <div class="send_message">
                    <button type="submit">Send Message</button>
                </div>
            </div>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 StudyFlow. All rights reserved.</p>
    </footer>
</body>

</html>
