<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/auth.css">

</head>

<body>

    <main class="page-container">
        <img src="../img/appLogoBlack.png" alt="StudyFlow app logo" width="32" height="32" class="auth-logo">
        <h1 class="auth-title">Create an Account</h1>
        <p class="auth-text">Join StudyFlow to manage your tasks</p>

        <div class="auth-card">
            <form action="../php/signUp.php" method="POST">

                <div class="form-group">
                    <label for="name">Full Name <span>*</span></label>
                    <input type="text" name="name" id="name" placeholder="Name" autocomplete="name" required class="auth-input">
                </div>
                <div class="form-group">
                    <label for="email">Email Address <span>*</span></label>
                    <input type="email" name="email" id="email" placeholder="Email" autocomplete="email" required class="auth-input">
                </div>

                <div class="form-group">
                    <label for="password">Password <span>*</span></label>
                    <input type="password" name="password" id="password" placeholder="Password" autocomplete="new-password" required class="auth-input">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password <span>*</span></label>
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required
                        autocomplete="new-password" class="auth-input">
                </div>

                <button type="submit" class="auth-button">Create Account</button>

            </form>
            <p class="auth-text">Already have an account? <a href="sign-in.html"
                    class="auth-link">Sign In</a></p>
        </div>
        <p><a href="../index.html" class="back-home-link">&#8592; Back to Home</a></p>

    </main>
</body>

</html>
